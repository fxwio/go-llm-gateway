server:
  host: "127.0.0.1"
  port: 18080
  read_timeout: 30s
  read_header_timeout: 5s
  write_timeout: 30s
  idle_timeout: 30s
  shutdown_timeout: 5s
  trusted_proxy_cidrs:
    - "127.0.0.1/32"

metrics:
  path: "/metrics"
  bearer_token_env: "METRICS_BEARER_TOKEN"
  allowed_cidrs: []
  rate_limit_rps: 5
  rate_limit_burst: 10
  enable_openmetrics: true

debug:
  pprof_enabled: true
  pprof_path_prefix: "/debug/pprof"

redis:
  addr: "127.0.0.1:6379"
  db: 0

auth:
  valid_tokens_env: GATEWAY_VALID_TOKENS
  rate_limit_qps: 10
  rate_limit_burst: 20
  admin:
    bearer_token_env: GATEWAY_ADMIN_TOKEN
    allowed_cidrs: []
    rate_limit_rps: 2
    rate_limit_burst: 4

cache:
  enabled: false
  ttl: 1m
  max_payload_bytes: 1024
  coalesce_enabled: false

providers:
  - name: "openai"
    base_url: "https://api.openai.com"
    api_key_env: "OPENAI_API_KEY"
    models:
      - "gpt-4o"
