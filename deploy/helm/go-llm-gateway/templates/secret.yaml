{{- if and .Values.envFromSecret.enabled (not .Values.envFromSecret.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "go-llm-gateway.fullname" . }}-env
type: Opaque
stringData:
{{- range $key, $value := .Values.envFromSecret.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
