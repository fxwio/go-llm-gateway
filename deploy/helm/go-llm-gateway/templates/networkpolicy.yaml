{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "go-llm-gateway.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "go-llm-gateway.name" . }}
  policyTypes:
    - Ingress
  ingress:
{{ toYaml .Values.networkPolicy.ingress | indent 4 }}
{{- end }}
