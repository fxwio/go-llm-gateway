services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_CONFIG_PATH: /etc/go-llm-gateway/config.yaml
    env_file:
      - .env
    volumes:
      - ./config.yaml:/etc/go-llm-gateway/config.yaml:ro
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: gateway-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    container_name: gateway-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
