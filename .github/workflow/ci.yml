name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Download Dependencies
      run: go mod download

    - name: Build Gateway
      run: go build -v ./...

    - name: Run Tests with Race Detector
      run: go test -v -race -cover ./...