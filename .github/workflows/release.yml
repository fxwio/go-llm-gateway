name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.meta.outputs.version }} \
            --build-arg COMMIT=${GITHUB_SHA::12} \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:${GITHUB_SHA::12} \
            .
          docker push ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          docker push ghcr.io/${{ github.repository }}:${GITHUB_SHA::12}

      - name: Create release notes
        run: bash scripts/release/generate-changelog.sh ${{ steps.meta.outputs.version }} > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
