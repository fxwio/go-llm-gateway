server:
  port: 8080
  read_timeout: 300s
  write_timeout: 300s

redis:
  addr: "redis:6379"
  password: ""
  db: 0

auth:
  valid_tokens:
    - "sk-my-gateway-token-001"
    - "sk-my-gateway-token-002"

  rate_limit_qps: 10
  rate_limit_burst: 20

providers:
  - name: "openai"
    base_url: "https://api.openai.com"
    api_key_env: "OPENAI_API_KEY"
    models:
      - "gpt-4o"
      - "gpt-3.5-turbo"

  - name: "anthropic"
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      - "claude-3-opus"
      - "claude-3-sonnet"

  - name: "siliconflow"
    base_url: "https://api.siliconflow.cn"
    api_key_env: "SILICONFLOW_API_KEY"
    models:
      - "Qwen/Qwen3.5-122B-A10B"
      - "deepseek-ai/DeepSeek-R1"

  # 如果你以后接本地 vLLM / Ollama / 内网兼容网关，不需要鉴权时可以这样配：
  # - name: "local-vllm"
  #   base_url: "http://host.docker.internal:8000"
  #   models:
  #     - "Qwen/Qwen2.5-7B-Instruct"